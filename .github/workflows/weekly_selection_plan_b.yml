name: Weekly Stock Selection - Plan B (Aggressive)

on:
  workflow_dispatch:  # 手动触发
    inputs:
      max_stocks:
        description: '最多处理的股票数量（用于测试，空表示全部）'
        required: false
        default: ''
      enable_ai:
        description: '是否启用AI分析'
        required: true
        default: 'true'
        type: boolean
      enable_news:
        description: '是否启用新闻搜索'
        required: true
        default: 'true'
        type: boolean
      enable_push:
        description: '是否推送到企业微信'
        required: true
        default: 'true'
        type: boolean

jobs:
  weekly-selection:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Verify code version
      run: |
        echo "Checking latest commit..."
        git log -1 --oneline
        echo ""
        echo "=========================================="
        echo "CRITICAL: Checking for _get_sorted_weekly_fetchers in base.py"
        echo "=========================================="
        grep -n "_get_sorted_weekly_fetchers" data_provider/base.py && echo "ERROR: Old method still exists!" || echo "OK: Old method not found (fixed)"
        echo ""
        echo "Checking get_weekly_data_batch_with_failover method..."
        grep -n "def get_weekly_data_batch_with_failover" data_provider/base.py
        grep -n "self._weekly_fetchers" data_provider/base.py | head -5
        echo ""
        echo "Code version check completed."
      continue-on-error: true
    
    - name: Run Weekly Selection - Plan B
      env:
        # DeepSeek API配置
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        # Gemini API配置
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # 新闻搜索API
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        BOCHA_API_KEY: ${{ secrets.BOCHA_API_KEY }}
        BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        # 企业微信推送
        WECHAT_WORK_WEBHOOK: ${{ secrets.WECHAT_WORK_WEBHOOK }}
        # LLM模型配置
        LITELLM_MODEL: deepseek/deepseek-reasoner
      run: |
        python -c "
        from weekly_stock_selector_plan_b import WeeklyStockSelectorPlanB
        import logging
        from datetime import datetime
        
        # 配置日志
        logging.basicConfig(level=logging.INFO)
        
        # 获取输入参数
        max_stocks_input = '${{ github.event.inputs.max_stocks }}'
        max_stocks = int(max_stocks_input) if max_stocks_input else None
        enable_ai = '${{ github.event.inputs.enable_ai }}' == 'true'
        enable_news = '${{ github.event.inputs.enable_news }}' == 'true'
        enable_push = '${{ github.event.inputs.enable_push }}' == 'true'
        
        # 获取今天是周几
        today_weekday = datetime.now().weekday()
        weekday_names = ['周一', '周二', '周三', '周四', '周五']
        
        print(f'运行参数:')
        print(f'  max_stocks: {max_stocks}')
        print(f'  enable_ai: {enable_ai}')
        print(f'  enable_news: {enable_news}')
        print(f'  enable_push: {enable_push}')
        print(f'今天是{weekday_names[today_weekday]}，运行方案B（激进型）')
        
        # 运行方案B（激进型）
        selector = WeeklyStockSelectorPlanB()
        stocks, ai_results = selector.run_with_ai_analysis(
            max_stocks=max_stocks,
            enable_ai_analysis=enable_ai,
            enable_news_search=enable_news,
            enable_push=enable_push,
            verbose=True
        )
        
        print(f'\n方案B（激进型）选股完成！')
        print(f'共筛选出 {len(stocks)} 只股票')
        print(f'注意：今天是{weekday_names[today_weekday]}，使用了放大系数拟合')
        "
    
    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: weekly-selection-plan-b-results
        path: |
          logs/
          output/
        retention-days: 30
