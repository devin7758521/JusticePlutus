name: Weekly Stock Selection - Plan A (Conservative)

on:
  workflow_dispatch:  # 手动触发
    inputs:
      max_stocks:
        description: '最多处理的股票数量（用于测试，空表示全部）'
        required: false
        default: ''
      enable_ai:
        description: '是否启用AI分析'
        required: true
        default: 'true'
        type: boolean
      enable_news:
        description: '是否启用新闻搜索'
        required: true
        default: 'true'
        type: boolean
      enable_push:
        description: '是否推送到企业微信'
        required: true
        default: 'true'
        type: boolean

jobs:
  weekly-selection:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Verify code version
      run: |
        echo "Checking latest commit..."
        git log -1 --oneline
        echo "Checking BaostockWeeklyFetcher priority..."
        grep -A 5 "class BaostockWeeklyFetcher" data_provider/weekly_fetcher.py | grep "priority" || echo "Priority check completed"
        echo "Code version check completed."
      continue-on-error: true
    
    - name: Run Weekly Selection - Plan A
      env:
        # DeepSeek API配置
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        # Gemini API配置
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # 新闻搜索API
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        BOCHA_API_KEY: ${{ secrets.BOCHA_API_KEY }}
        BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        # 企业微信推送
        WECHAT_WORK_WEBHOOK: ${{ secrets.WECHAT_WORK_WEBHOOK }}
        # LLM模型配置
        LITELLM_MODEL: deepseek/deepseek-reasoner
      run: |
        python -c "
        from weekly_stock_selector_plan_a import WeeklyStockSelectorPlanA
        import logging
        
        # 配置日志
        logging.basicConfig(level=logging.INFO)
        
        # 获取输入参数
        max_stocks_input = '${{ github.event.inputs.max_stocks }}'
        max_stocks = int(max_stocks_input) if max_stocks_input else None
        enable_ai = '${{ github.event.inputs.enable_ai }}' == 'true'
        enable_news = '${{ github.event.inputs.enable_news }}' == 'true'
        enable_push = '${{ github.event.inputs.enable_push }}' == 'true'
        
        print(f'运行参数:')
        print(f'  max_stocks: {max_stocks}')
        print(f'  enable_ai: {enable_ai}')
        print(f'  enable_news: {enable_news}')
        print(f'  enable_push: {enable_push}')
        
        # 运行方案A（稳健型）
        selector = WeeklyStockSelectorPlanA()
        stocks, ai_results = selector.run_with_ai_analysis(
            max_stocks=max_stocks,
            enable_ai_analysis=enable_ai,
            enable_news_search=enable_news,
            enable_push=enable_push,
            verbose=True
        )
        
        print(f'\n方案A（稳健型）选股完成！')
        print(f'共筛选出 {len(stocks)} 只股票')
        "
    
    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: weekly-selection-plan-a-results
        path: |
          logs/
          output/
        retention-days: 30
